services:
  - type: web
    name: crawlforge
    env: node
    region: oregon
    plan: starter
    buildCommand: cd client && npm install && npm run build && cd ../server && PLAYWRIGHT_BROWSERS_PATH=0 npm install && PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install chromium
    startCommand: cd dataforge/server && node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        fromService:
          type: web
          name: crawlforge
          envVarKey: RENDER_EXTERNAL_URL
      - key: DATABASE_URL
        fromDatabase:
          name: crawlforge-db
          property: connectionString
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: REDIS_URL
        value: ""
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

databases:
  - name: crawlforge-db
    plan: starter
    region: oregon
    databaseName: crawlforge
    ipAllowList: []
